# bytetrack_clara.yaml — config de ByteTrack tuneada para CLARA
#
# Diferencia clave vs el default de Ultralytics: track_buffer mas alto.
# track_buffer = cuantos frames espera ByteTrack antes de "matar" un
# track que perdio. Con valor alto, aguanta oclusiones largas (otra
# jugadora pasa enfrente) sin partir el track en un ID nuevo.
#
# Voleibol tiene mucha oclusion (jugadoras juntas en la red, bloqueos),
# por eso subimos el buffer respecto al default (30).
#
# NOTA (v0.7): track_buffer se cuenta en frames que ve el tracker. Desde
# que CLARA dejo de saltar frames (el tracker procesa el video completo),
# 90 frames equivalen a solo ~3 s a 30 fps — corto para una rotacion con
# oclusion larga. Subido a 300 (~10 s) para conservar la tolerancia real
# que daba el modo viejo (90 pasos x stride 5 = 450 frames de video).

tracker_type: bytetrack
track_high_thresh: 0.25    # umbral para detecciones de alta confianza
track_low_thresh: 0.10     # umbral para segunda asociacion (recupera perdidos)
new_track_thresh: 0.40     # confianza minima para crear un track nuevo
track_buffer: 300          # frames que aguanta un track perdido (default 30)
# match_thresh: en Ultralytics el costo es (1 - IoU) y se acepta si
# costo <= match_thresh, o sea IoU >= 1 - match_thresh. Por eso SUBIRLO lo
# hace mas permisivo: 0.90 acepta hasta IoU >= 0.10, tolerando jugadoras que
# se mueven rapido o se ocluyen parcial sin partir el track en un ID nuevo.
match_thresh: 0.90
fuse_score: True           # combina score de deteccion con IoU al asociar
