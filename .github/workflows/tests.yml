name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        # Install only what unit tests need (no ultralytics/rtmlib/onnxruntime)
        # — module imports are lazy so unit tests don't pull in model weights.
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy pytest pytest-cov
      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml
      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
